# -----------------------------------------------------
# General window decoration
# -----------------------------------------------------

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
    # dim_inactive = true

    blur {
        enabled = false
        size = 8
        passes = 1
        new_optimizations = on
        ignore_opacity = true
        xray = true
        # blurls = waybar
        noise = 0
        special = false
    }

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = 0x66000000
    }
}
