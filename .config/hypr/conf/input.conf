# -----------------------------------------------------
# Input and Touchpad
# -----------------------------------------------------

input {
    kb_layout = us
    kb_variant = 
    kb_model =
    kb_options =
    numlock_by_default = true
    mouse_refocus = false

    follow_mouse = 1

    touchpad {
        # for laptop
        natural_scroll = true
        scroll_factor = 1.0
    }

    sensitivity = 1.0 # Pointer speed: -1.0 - 1.0, 0 means no modification.
}

gesture = 3, horizontal, workspace
gesture = 3, vertical, workspace

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
